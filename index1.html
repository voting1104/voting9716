<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote - Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; --success: #059669; --dark: #0f172a; 
            --glass: rgba(255, 255, 255, 0.9); --outlook: #0078d4; --gmail: #ea4335;
        }
        * { transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        body { margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #cbd5e1; background-size: cover; background-position: center; background-attachment: fixed; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1; }
        .container { background: var(--glass); backdrop-filter: blur(12px); width: 100%; max-width: 500px; padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 5px; color: white; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .btn-login { background: var(--dark); }
        .btn-vote { background: var(--success); width: auto; padding: 8px 20px; }
        .btn-outlook { background: var(--outlook); flex: 1; }
        .btn-gmail { background: var(--gmail); flex: 1; }
        /* Style for Auto-Generate Button */
        .btn-auto { background: #7c3aed; margin-bottom: 8px; font-size: 13px; }
        
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #eee; }
        .symbol-frame { width: 60px; height: 60px; border-radius: 50%; background: #eee; margin-right: 15px; overflow: hidden; border: 2px solid #ddd; }
        .symbol-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .manager-section { background: rgba(255,255,255,0.5); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .hidden { display: none; }
        .btn-edit { font-size: 10px; padding: 5px; width: auto; background: #f1f5f9; color: #475569; margin-right: 5px; border: 1px solid #ccc; }
        label { font-size: 12px; font-weight: bold; color: var(--dark); }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container">

    <!-- LOGIN SECTION -->
    <div id="loginSection">
        <h2>SecureVote Login</h2>
        <input type="text" id="loginID" placeholder="User ID">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn-login" onclick="handleLogin()">Sign In to Portal</button>
    </div>

    <!-- MANAGER DASHBOARD -->
    <div id="managerDash" class="hidden">
        <h2>Manager Dashboard</h2>
        
        <!-- STEP 1: BACKGROUND CONTROL -->
        <div class="manager-section">
            <label>Set Page Backgrounds (Paste Image URLs)</label>
            <input type="text" id="bgLoginUrl" placeholder="Login Background URL" onchange="saveExternalBG('login', this.value)">
            <input type="text" id="bgVoterUrl" placeholder="Voter Background URL" onchange="saveExternalBG('voter', this.value)">
        </div>

        <!-- STEP 2: REGISTER & EMAIL VOTER -->
        <div class="manager-section">
            <label>Register & Send Login Credentials</label>
            <input type="text" id="siteUrl" placeholder="Project Link" value=" https://voting1104.github.io/voting1104/">
            <input type="email" id="vEmail" placeholder="Voter Email Address">
            
            <!-- ADDED AUTO GENERATE BUTTON -->
            <button class="btn-auto" onclick="generateCredentials()">✨ Auto-Generate ID & Pass</button>
            
            <div style="display:flex; gap:10px;">
                <input type="text" id="vID" placeholder="Assigned ID" style="flex:1">
                <input type="text" id="vPass" placeholder="Assigned Pass" style="flex:1">
            </div>
            <div style="display:flex; gap:10px; margin-top:5px;">
                <button class="btn-outlook" onclick="registerAndSend('outlook')">📧 Via Outlook</button>
                <button class="btn-gmail" onclick="registerAndSend('gmail')">📧 Via Gmail</button>
            </div>
        </div>

        <h4>Manage Candidates</h4>
        <div id="managerResults"></div>
        <button onclick="location.reload()" style="background:#fee2e2; color:#dc2626;">Logout Admin</button>
    </div>

    <!-- VOTER DASHBOARD -->
    <div id="voterDash" class="hidden">
        <h2 id="vH">Digital Ballot Box</h2>
        <div id="voterBallot"></div>
        <div id="voterResultsView" class="hidden" style="margin-top:20px; padding:15px; background:white; border-radius:15px; border: 1px solid var(--primary);">
            <h4 style="margin:0; text-align:center;">Live Election Standings</h4>
            <div id="vResults" style="margin-top:10px;"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; color: black; border: 1px solid #ccc;">Logout</button>
    </div>

</div>

<script>
    /* ============================================================
       PERMANENT HARDCODED SETTINGS
    ============================================================ */
    
    const INITIAL_CANDIDATES = {
        "BRS": { votes: 0, image: "https://munsifdaily.com/wp-content/uploads/2024/12/BRS-1.jpg" },
        "BJP": { votes: 0, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Logo_of_the_Bharatiya_Janata_Party.svg/1280px-Logo_of_the_Bharatiya_Janata_Party.svg.png" },
        "CONGRESS": { votes: 0, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Indian_National_Congress_hand_logo.svg/250px-Indian_National_Congress_hand_logo.svg.png" }
    };

    const INITIAL_BGS = { 
        login: "https://media.assettype.com/theleaflet/import/wp-content/uploads/2024/04/Election-scaled.jpg?w=1200&h=675&auto=format%2Ccompress&fit=max&enlarge=true", 
        voter: "https://media.gettyimages.com/id/1421023235/vector/online-vote.jpg?s=612x612&w=gi&k=20&c=yCHCzsxTPj0HH4DhW4_W5_f0r_nEeaF26cgwCyziFNw="
    };

    /* ============================================================
       SYSTEM LOGIC
    ============================================================ */

    let storedCandidates = JSON.parse(localStorage.getItem('ext_candidates')) || {};
    let voters = JSON.parse(localStorage.getItem('ext_voters')) || [];
    let storedBgs = JSON.parse(localStorage.getItem('ext_bgs')) || {};

    let candidates = INITIAL_CANDIDATES; 
    for (let key in candidates) {
        if (storedCandidates[key]) { candidates[key].votes = storedCandidates[key].votes; }
    }

    let backgrounds = {
        login: INITIAL_BGS.login || storedBgs.login || "",
        voter: INITIAL_BGS.voter || storedBgs.voter || ""
    };

    const MID = "23b81a05hw";
    const MPASS = "shankari";
    let activeVoter = null;

    window.onload = () => applyBG('login');

    function applyBG(page) {
        if(backgrounds[page]) { document.body.style.backgroundImage = "url('" + backgrounds[page] + "')"; }
    }

    function handleLogin() {
        const id = document.getElementById('loginID').value;
        const pass = document.getElementById('loginPass').value;
        if(id === MID && pass === MPASS) { loadManager(); } 
        else {
            const v = voters.find(u => u.id === id && u.pass === pass);
            if(v) { activeVoter = v; loadVoter(); } else { alert("Wrong ID or Password!"); }
        }
    }

    // --- ADDED AUTOMATIC GENERATION FUNCTION ---
    function generateCredentials() {
        // Generates a random ID like V-5821
        const randomID = "V-" + Math.floor(1000 + Math.random() * 9000);
        // Generates a random 6-character uppercase password
        const randomPass = Math.random().toString(36).slice(-6).toUpperCase();
        
        document.getElementById('vID').value = randomID;
        document.getElementById('vPass').value = randomPass;
    }

    function loadManager() {
        applyBG('voter'); 
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('managerDash').classList.remove('hidden');
        const list = document.getElementById('managerResults');
        list.innerHTML = "";
        Object.keys(candidates).forEach(name => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="symbol-frame"><img src="${candidates[name].image}"></div>
                <div style="flex-grow:1">
                    <b>${name}</b><br>
                    <button class="btn-edit" onclick="changeName('${name}')">Rename</button>
                    <button class="btn-edit" onclick="changeImgUrl('${name}')">Set Image URL</button>
                </div>
                <div style="font-weight:bold; color:var(--primary)">${candidates[name].votes} Votes</div>
            `;
            list.appendChild(card);
        });
    }

    function registerAndSend(platform) {
        const email = document.getElementById('vEmail').value;
        const id = document.getElementById('vID').value;
        const pass = document.getElementById('vPass').value;
        const url = document.getElementById('siteUrl').value;

        if(!email || !id || !pass) return alert("Please fill Email, ID, and Password!");

        if(!voters.find(v => v.id === id)) {
            voters.push({id, pass, email, hasVoted: false});
            localStorage.setItem('ext_voters', JSON.stringify(voters));
        }

        const subject = encodeURIComponent("Your SecureVote Access Credentials");
        const body = encodeURIComponent(`Portal Link: ${url}\nVoter ID: ${id}\nPassword: ${pass}`);

        let mailUrl = platform === 'outlook' 
            ? `https://outlook.office.com/mail/deeplink/compose?to=${email}&subject=${subject}&body=${body}`
            : `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${subject}&body=${body}`;
        
        window.open(mailUrl, '_blank');
        alert("Voter registered locally!");
    }

    function changeImgUrl(name) {
        const url = prompt("Enter Image URL for " + name, candidates[name].image);
        if(url) {
            candidates[name].image = url;
            localStorage.setItem('ext_candidates', JSON.stringify(candidates));
            loadManager();
        }
    }

    function changeName(old) {
        const n = prompt("New name for " + old, old);
        if(n && n !== old) {
            candidates[n] = candidates[old];
            delete candidates[old];
            localStorage.setItem('ext_candidates', JSON.stringify(candidates));
            loadManager();
        }
    }

    function saveExternalBG(type, url) {
        backgrounds[type] = url;
        localStorage.setItem('ext_bgs', JSON.stringify(backgrounds));
        applyBG(type);
    }

    function loadVoter() {
        applyBG('voter');
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('voterDash').classList.remove('hidden');
        updateVoterUI();
    }

    function updateVoterUI() {
        const box = document.getElementById('voterBallot');
        box.innerHTML = "";
        if(activeVoter.hasVoted) {
            document.getElementById('vH').innerText = "Vote Verified Successfully";
            document.getElementById('voterResultsView').classList.remove('hidden');
            document.getElementById('vResults').innerHTML = Object.keys(candidates).map(n => 
                `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee;">
                    <b>${n}</b> <span>${candidates[n].votes} Votes</span>
                </div>`).join("");
        } else {
            Object.keys(candidates).forEach(name => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="symbol-frame"><img src="${candidates[name].image}"></div>
                    <div style="flex-grow:1"><b>${name}</b></div>
                    <button class="btn-vote" onclick="castVote('${name}')">Vote</button>
                `;
                box.appendChild(card);
            });
        }
    }

    function castVote(name) {
        if(confirm("Confirm your vote for " + name + "?")) {
            candidates[name].votes++;
            activeVoter.hasVoted = true;
            voters.find(u => u.id === activeVoter.id).hasVoted = true;
            localStorage.setItem('ext_candidates', JSON.stringify(candidates));
            localStorage.setItem('ext_voters', JSON.stringify(voters));
            updateVoterUI();
        }
    }
</script>
</body>
</html>
